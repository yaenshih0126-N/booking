<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工識別證拍攝預約系統 (雲端同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .slot-card { transition: all 0.2s; }
        .slot-card:not(.disabled):hover { transform: translateY(-2px); border-color: #3b82f6; }
        .disabled { opacity: 0.5; cursor: not-allowed; background-color: #e5e7eb; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- 讀取遮罩 -->
    <div id="loading" class="loading-overlay">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-blue-600 font-medium">連線至雲端資料庫中...</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- 頁首 -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">員工識別證拍攝預約系統</h1>
            <p class="mt-2 opacity-90">雲端即時同步版：4/15 - 4/23 (僅限每週二、三、四)</p>
            <p class="text-sm opacity-80">各時段上限 10 人，主管可一次為多名同仁預約</p>
        </div>

        <div class="p-6">
            <!-- 填寫資料區 -->
            <div class="bg-blue-50 p-6 rounded-lg border border-blue-100 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">部門名稱</label>
                        <select id="dept" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 bg-white">
                            <option value="">請選擇部門...</option>
                            <option>COM-區域業務一部 - 內湖 (ETP)</option>
                            <option>CS-顧客服務部一組 (CCC)</option>
                            <option>CS-顧客服務部二組 (CCC)</option>
                            <option>CS-顧客服務部三組 (CCC)</option>
                            <option>CS-顧客服務部四組 (CCC)</option>
                            <option>CS-顧客關係部一組 (CCD)</option>
                            <option>CS-顧客關係部二組 (CCD)</option>
                            <option>CS-顧客服務發展部 (CSD)</option>
                            <option>CS-主要客戶服務部一組 (KAS)</option>
                            <option>CS-主要客戶服務部二組 (KAS)</option>
                            <option>FIN-帳單及帳務查詢部 - 帳務查詢組 (BLL&QH)</option>
                            <option>FIN-帳單及帳務查詢部 - 帳務管理組 (BLL&QH)</option>
                            <option>FIN-帳務催收部一組 (CC&AR)</option>
                            <option>FIN-帳務催收部二組 (CC&AR)</option>
                            <option>GBS-採購部 (CPD)</option>
                            <option>GBS-總務部 (CRE)</option>
                            <option>IT-客戶資訊科技部 (CFI)</option>
                            <option>IT-技術服務管理部 - 資訊服務組 (HD)</option>
                            <option>IT-技術服務管理部 (SM)</option>
                            <option>OPS-GTW報關部 - B2B-6 (ICC)</option>
                            <option>OPS-GTW報關部 - B2B-T1 (ICC)</option>
                            <option>OPS-GTW報關部 - B2C (ICC)</option>
                        </select>
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">聯絡人/主管職編</label>
                        <input type="text" id="userStaffId" placeholder="請輸入職編" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">預約拍攝人數</label>
                        <select id="personCount" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 bg-white">
                            <option value="1">1 人</option><option value="2">2 人</option><option value="3">3 人</option>
                            <option value="4">4 人</option><option value="5">5 人</option><option value="6">6 人</option>
                            <option value="7">7 人</option><option value="8">8 人</option><option value="9">9 人</option>
                            <option value="10">10 人</option>
                        </select>
                    </div>
                </div>
                <p class="text-xs text-blue-600 mt-3 italic font-medium">※ 請先填寫上方資訊，再點選下方時段區塊即可完成預約。</p>
            </div>

            <!-- 日期導航 -->
            <div id="dateTabs" class="flex flex-wrap gap-2 mb-6 border-b pb-4 overflow-x-auto"></div>

            <!-- 時段列表 -->
            <div id="timeSlots" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <!-- 管理功能 -->
        <div class="p-6 bg-gray-50 border-t flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <p class="text-xs text-green-600 font-bold">● 雲端連線狀態：<span id="connStatus">確認中...</span></p>
                <p class="text-[10px] text-gray-400">目前雲端總預約人次：<span id="totalStats">0</span></p>
            </div>
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
                <button onclick="clearAllData()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md transition flex-1 md:flex-none">
                    🗑️ 清空所有預約 (測試用)
                </button>
                <button onclick="exportData()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md transition flex-1 md:flex-none">
                    📥 匯出完整預約名單 (CSV)
                </button>
            </div>
        </div>
    </div>

    <!-- 摘要確認/訊息彈窗 -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full shadow-2xl">
            <div id="modalIcon" class="text-5xl mb-3 text-center">✅</div>
            <h3 id="modalTitle" class="text-xl font-bold mb-2 text-center">訊息</h3>
            <div id="modalContent" class="text-gray-600 mb-6 space-y-2">
                <p id="modalMsg" class="text-center whitespace-pre-line"></p>
            </div>
            <div id="modalActions" class="flex gap-3">
                <button id="modalSecondaryBtn" onclick="closeModal()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 rounded-xl font-bold transition hidden">取消</button>
                <button id="modalBtn" onclick="closeModal()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition shadow-lg text-center">確定</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, addDoc, deleteDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyCjcVEG4GXGkqPl-pjXrkzsm69A11eXXpE",
            authDomain: "mybooking-7fa2e.firebaseapp.com",
            projectId: "mybooking-7fa2e",
            storageBucket: "mybooking-7fa2e.firebasestorage.app",
            messagingSenderId: "1018514518020",
            appId: "1:1018514518020:web:176339c3b90097efb10551",
            measurementId: "G-05KFQVLLQ0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'id-card-booking-v1';

        const MAX_CAPACITY = 10;
        const startDate = new Date('2026-04-15');
        const endDate = new Date('2026-04-23');
        
        let allBookings = [];
        let selectedDate = '04-15';
        let currentUser = null;

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                showInfoModal('連線失敗', '請確認 Firebase 控制台已啟用「匿名驗證」功能。', '❌');
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('connStatus').innerText = '已連線 (雲端同步中)';
                startListening();
            } else {
                document.getElementById('connStatus').innerText = '嘗試連線中...';
            }
        });

        function startListening() {
            if (!currentUser) return;
            const bookingsCol = collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
            const q = query(bookingsCol);
            
            onSnapshot(q, (snapshot) => {
                allBookings = [];
                snapshot.forEach(doc => {
                    allBookings.push({ id: doc.id, ...doc.data() });
                });
                document.getElementById('loading').style.display = 'none';
                initDateTabs();
                renderTimeSlots();
            }, (error) => {
                console.error("Firestore Error:", error);
                showInfoModal('資料讀取失敗', '請確認 Firestore 規則 (Rules) 是否已設為允許讀寫。', '❌');
            });
        }

        window.clearAllData = async function() {
            if (allBookings.length === 0) {
                showInfoModal('提示', '目前資料庫已經是空的。', 'ℹ️');
                return;
            }

            showConfirmModal({
                title: '⚠️ 警告：危險操作',
                content: `<p class="text-red-600 font-bold text-center">您確定要刪除「所有」預約紀錄嗎？</p><p class="text-xs text-gray-500 mt-2 text-center">此操作無法復原，僅建議在測試階段使用。</p>`,
                icon: '🗑️',
                onConfirm: async () => {
                    document.getElementById('loading').style.display = 'flex';
                    try {
                        const bookingsCol = collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
                        const snapshot = await getDocs(bookingsCol);
                        const deletePromises = snapshot.docs.map(docSnap => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'bookings', docSnap.id)));
                        await Promise.all(deletePromises);
                        showInfoModal('已清空', '所有雲端預約紀錄已成功刪除。', '✅');
                    } catch (error) {
                        console.error("Clear Error:", error);
                        showInfoModal('清除失敗', '無法刪除資料，請檢查權限。', '❌');
                    } finally {
                        document.getElementById('loading').style.display = 'none';
                    }
                }
            });
        };

        window.handleBooking = function(slotID, timeRange, remaining) {
            const dept = document.getElementById('dept').value;
            const staffId = document.getElementById('userStaffId').value.trim();
            const requestedCount = parseInt(document.getElementById('personCount').value);

            if (!dept || !staffId) {
                showInfoModal('⚠️ 資料不全', '請先選擇部門並填寫聯絡人職編。', '🏢');
                return;
            }
            if (requestedCount > remaining) {
                showInfoModal('⚠️ 名額不足', `此時段僅剩 ${remaining} 個名額，無法一次預約 ${requestedCount} 人。`, '❌');
                return;
            }

            showConfirmModal({
                title: '確認預約內容',
                content: `
                    <div class="bg-blue-50 p-4 rounded-lg text-left text-sm border border-blue-100">
                        <p><strong>📅 預約日期：</strong>${selectedDate}</p>
                        <p><strong>⏰ 預約時段：</strong>${timeRange}</p>
                        <p><strong>🏢 預約部門：</strong>${dept}</p>
                        <p><strong>🆔 聯絡職編：</strong>${staffId}</p>
                        <p class="text-blue-600 font-bold text-lg mt-2"><strong>👥 預約人數：</strong>${requestedCount} 人</p>
                    </div>
                `,
                icon: '📝',
                onConfirm: () => submitBooking(slotID, timeRange, dept, staffId, requestedCount)
            });
        };

        async function submitBooking(slotID, timeRange, dept, staffId, requestedCount) {
            document.getElementById('loading').style.display = 'flex';
            try {
                const bookingsCol = collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
                const promises = [];
                for(let i = 0; i < requestedCount; i++) {
                    promises.push(addDoc(bookingsCol, {
                        slotID,
                        timeRange,
                        dept,
                        // 考量到多位預約，我們依然在內部紀錄中標註順序，但不存姓名
                        staffId: `${staffId}${requestedCount > 1 ? `-${i+1}` : ''}`,
                        managerId: staffId,
                        createdAt: serverTimestamp(),
                        userId: currentUser.uid
                    }));
                }
                await Promise.all(promises);
                showInfoModal('預約成功', `已完成預約！\n時段：${selectedDate} ${timeRange}\n人數：${requestedCount} 人`, '✅');
            } catch (error) {
                console.error("Write Error:", error);
                showInfoModal('預約失敗', '無法寫入資料。', '❌');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        function showInfoModal(title, msg, icon) {
            const modal = document.getElementById('modal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMsg').innerText = msg;
            document.getElementById('modalMsg').classList.remove('hidden');
            document.getElementById('modalIcon').innerText = icon;
            document.getElementById('modalSecondaryBtn').classList.add('hidden');
            const customContent = document.getElementById('modalCustomContent');
            if(customContent) customContent.remove();
            const btn = document.getElementById('modalBtn');
            btn.innerText = '確定';
            btn.onclick = closeModal;
            modal.classList.remove('hidden');
        }

        function showConfirmModal({title, content, icon, onConfirm}) {
            const modal = document.getElementById('modal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMsg').classList.add('hidden');
            document.getElementById('modalIcon').innerText = icon;
            const contentArea = document.getElementById('modalContent');
            const oldCustom = document.getElementById('modalCustomContent');
            if(oldCustom) oldCustom.remove();
            const div = document.createElement('div');
            div.id = 'modalCustomContent';
            div.innerHTML = content;
            contentArea.appendChild(div);
            document.getElementById('modalSecondaryBtn').classList.remove('hidden');
            const confirmBtn = document.getElementById('modalBtn');
            confirmBtn.innerText = '確認送出';
            confirmBtn.onclick = () => { closeModal(); onConfirm(); };
            modal.classList.remove('hidden');
        }

        function initDateTabs() {
            const tabs = document.getElementById('dateTabs');
            if (tabs.children.length > 0) return; 
            let current = new Date(startDate);
            while (current <= endDate) {
                const dayOfWeek = current.getDay();
                if (dayOfWeek >= 2 && dayOfWeek <= 4) {
                    const dateStr = formatDate(current);
                    const btn = document.createElement('button');
                    btn.className = `date-btn px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all`;
                    btn.innerText = `${dateStr} (${['日','一','二','三','四','五','六'][dayOfWeek]})`;
                    btn.id = `btn-${dateStr}`;
                    btn.onclick = () => { selectedDate = dateStr; updateDateTabUI(); renderTimeSlots(); };
                    tabs.appendChild(btn);
                }
                current.setDate(current.getDate() + 1);
            }
            updateDateTabUI();
        }

        function updateDateTabUI() {
            document.querySelectorAll('.date-btn').forEach(btn => {
                btn.className = btn.id === `btn-${selectedDate}` 
                    ? "date-btn px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-blue-600 text-white shadow-md"
                    : "date-btn px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap bg-gray-200 text-gray-700 hover:bg-gray-300";
            });
        }

        function renderTimeSlots() {
            const container = document.getElementById('timeSlots');
            container.innerHTML = '';
            const timeConfigs = [{s:10,e:11}, {s:14,e:15}];
            timeConfigs.forEach(config => {
                for (let hour = config.s; hour < config.e; hour++) {
                    for (let min = 0; min < 60; min += 20) {
                        const startStr = `${String(hour).padStart(2, '0')}:${String(min).padStart(2, '0')}`;
                        let endH = hour, endM = min + 20;
                        if (endM === 60) { endH++; endM = 0; }
                        const timeRange = `${startStr} - ${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}`;
                        const slotID = `${selectedDate}_${startStr}`;
                        const slotBookings = allBookings.filter(b => b.slotID === slotID);
                        const count = slotBookings.length;
                        const remaining = MAX_CAPACITY - count;
                        const isFull = count >= MAX_CAPACITY;
                        const div = document.createElement('div');
                        div.className = `slot-card p-4 border-2 rounded-xl cursor-pointer ${isFull ? 'disabled' : 'bg-white border-gray-100 shadow-sm border-l-4 border-l-blue-400'}`;
                        div.innerHTML = `
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-md font-bold text-gray-800">${timeRange}</span>
                                <span class="text-[10px] px-2 py-0.5 rounded-full font-bold ${isFull ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                    ${isFull ? '已滿額' : `餘 ${remaining} 名`}
                                </span>
                            </div>
                            <div class="flex items-end justify-between">
                                <div class="w-2/3 bg-gray-100 rounded-full h-2 mr-2"><div class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: ${(count/MAX_CAPACITY)*100}%"></div></div>
                                <span class="text-xs text-gray-500 font-medium">${count}/${MAX_CAPACITY}</span>
                            </div>
                        `;
                        if (!isFull) div.onclick = () => window.handleBooking(slotID, timeRange, remaining);
                        container.appendChild(div);
                    }
                }
            });
            document.getElementById('totalStats').innerText = allBookings.length;
        }

        // --- 匯出功能更新：同步修改職編欄位 ---
        window.exportData = function() {
            if (allBookings.length === 0) { showInfoModal('提示', '目前尚無預約資料。', 'ℹ️'); return; }
            
            // CSV 表頭：將姓名改為職編
            let csvContent = "\uFEFF拍攝日期,拍攝時段,部門,員工職編,預約人職編,系統操作預約時間\n";
            
            // 排序：先按拍攝日期，再按拍攝時段
            const sortedBookings = [...allBookings].sort((a,b) => a.slotID.localeCompare(b.slotID));
            
            sortedBookings.forEach(b => {
                let createdTimeStr = "未知";
                if (b.createdAt && b.createdAt.seconds) {
                    const date = new Date(b.createdAt.seconds * 1000);
                    createdTimeStr = `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}:${String(date.getSeconds()).padStart(2, '0')}`;
                }
                
                // 使用 staffId 與 managerId 代替姓名
                csvContent += `${b.slotID.split('_')[0]},${b.timeRange},"${b.dept}","${b.staffId || ''}","${b.managerId || ''}",${createdTimeStr}\n`;
            });
            
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
            link.download = `預約清單(去識別化)_${formatDate(new Date())}.csv`;
            link.click();
        };

        function formatDate(date) { return `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }

        initAuth();
    </script>
</body>
</html>
