<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>識別證照片拍攝預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 已填入您提供的 Firebase 金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyCjcVEG4GXGkqPl-pjXrkzsm69A11eXXpE",
            authDomain: "mybooking-7fa2e.firebaseapp.com",
            projectId: "mybooking-7fa2e",
            storageBucket: "mybooking-7fa2e.firebasestorage.app",
            messagingSenderId: "1018514518020",
            appId: "1:1018514518020:web:176339c3b90097efb10551",
            measurementId: "G-05KFQVLLQ0"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            window.FirebaseLib = { 
                auth, db, collection, onSnapshot, addDoc, serverTimestamp, signInAnonymously, onAuthStateChanged 
            };
            window.appId = 'my-booking-prod';
            window.dispatchEvent(new Event('firebase-ready'));
        } catch (err) {
            window.firebaseConfigError = "Firebase 初始化失敗：" + err.message;
            window.dispatchEvent(new Event('firebase-ready'));
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SLOT_LIMIT = 10;
        const WEEKDAYS = ["日", "一", "二", "三", "四", "五", "六"];
        const ALLOWED_DAYS = [2, 3, 4]; // 限定週二、三、四
        
        const DEPARTMENTS = [
            "COM-區域業務一部 - 內湖 (ETP)", "CS-顧客服務部一組 (CCC)", "CS-顧客服務部二組 (CCC)",
            "CS-顧客服務部三組 (CCC)", "CS-顧客服務部四組 (CCC)", "CS-顧客關係部一組 (CCD)",
            "CS-顧客關係部二組 (CCD)", "CS-顧客服務發展部 (CSD)", "CS-主要客戶服務部一組 (KAS)",
            "CS-主要客戶服務部二組 (KAS)", "FIN-帳單及帳務查詢部 - 帳務查詢組 (BLL&QH)",
            "FIN-帳單及帳務查詢部 - 帳務管理組 (BLL&QH)", "FIN-帳務催收部一組 (CC&AR)",
            "FIN-帳務催收部二組 (CC&AR)", "GBS-採購部 (CPD)", "GBS-總務部 (CRE)",
            "IT-客戶資訊科技部 (CFI)", "IT-技術服務管理部 - 資訊服務組 (HD)", "IT-技術服務管理部 (SM)",
            "OPS-GTW報關部 - B2B-6 (ICC)", "OPS-GTW報關部 - B2B-T1 (ICC)", "OPS-GTW報關部 - B2C (ICC)"
        ];

        function App() {
            const [fbStatus, setFbStatus] = useState({ ready: !!window.FirebaseLib, error: window.firebaseConfigError });
            const [user, setUser] = useState(null);
            const [bookings, setBookings] = useState([]);
            const [formData, setFormData] = useState({ name: '', department: '', date: '', slotId: '' });
            const [loading, setLoading] = useState(true);
            const [submitting, setSubmitting] = useState(false);
            const [message, setMessage] = useState({ type: '', text: '' });

            useEffect(() => {
                const handleReady = () => setFbStatus({ ready: !!window.FirebaseLib, error: window.firebaseConfigError });
                window.addEventListener('firebase-ready', handleReady);
                return () => window.removeEventListener('firebase-ready', handleReady);
            }, []);

            useEffect(() => {
                if (!fbStatus.ready || fbStatus.error) {
                    if (fbStatus.error) setLoading(false);
                    return;
                }
                const { auth, signInAnonymously, onAuthStateChanged } = window.FirebaseLib;
                signInAnonymously(auth).catch(() => setFbStatus(p => ({...p, error: '登入失敗。請檢查 Firebase Console -> Authentication 是否已開啟「匿名」登入。'})));
                return onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
            }, [fbStatus]);

            useEffect(() => {
                if (!user || !fbStatus.ready) return;
                const { db, collection, onSnapshot } = window.FirebaseLib;
                const q = collection(db, 'bookings');
                return onSnapshot(q, (snap) => {
                    setBookings(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => {
                    setFbStatus(p => ({...p, error: '資料庫讀取權限不足。請檢查 Firestore Database 是否已建立並將 Rules 設為測試模式。'}));
                });
            }, [user, fbStatus]);

            const availableDates = useMemo(() => {
                const dates = [];
                for (let d = 14; d <= 23; d++) {
                    const current = new Date(2026, 3, d);
                    if (ALLOWED_DAYS.includes(current.getDay())) {
                        dates.push({ value: `2026-04-${d}`, display: `${current.getMonth() + 1}/${d} (${WEEKDAYS[current.getDay()]})` });
                    }
                }
                return dates;
            }, []);

            const timeSlots = useMemo(() => {
                const slots = [];
                const addRange = (h1, h2) => {
                    for (let h = h1; h < h2; h++) {
                        for (let m of [0, 20, 40]) {
                            const t = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                            slots.push({ id: t, label: t });
                        }
                    }
                };
                addRange(10, 11);
                addRange(14, 15);
                return slots;
            }, []);

            const getCount = (date, tid) => bookings.filter(b => b.date === date && b.slotId === tid).length;

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (submitting) return;
                setSubmitting(true);
                const { db, collection, addDoc, serverTimestamp } = window.FirebaseLib;
                try {
                    if (getCount(formData.date, formData.slotId) >= SLOT_LIMIT) throw new Error("該時段已額滿！");
                    await addDoc(collection(db, 'bookings'), {
                        ...formData, createdAt: serverTimestamp()
                    });
                    setFormData(p => ({ ...p, slotId: '' }));
                    setMessage({ type: 'success', text: '預約成功！' });
                } catch (err) {
                    setMessage({ type: 'error', text: err.message });
                } finally {
                    setSubmitting(false);
                    setTimeout(() => setMessage({ type: '', text: '' }), 3000);
                }
            };

            if (fbStatus.error) return (
                <div className="flex items-center justify-center min-h-screen p-6 bg-slate-100">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl border border-rose-100 text-center max-w-md">
                        <div className="bg-rose-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <span className="text-rose-500 font-black text-2xl">!</span>
                        </div>
                        <h2 className="text-xl font-black text-slate-800 mb-4">系統權限未開啟</h2>
                        <p className="text-slate-500 text-sm leading-relaxed mb-6">{fbStatus.error}</p>
                        <div className="text-left bg-slate-50 p-4 rounded-xl text-xs text-slate-400 font-medium">
                            請在 Firebase 左側選單啟用「匿名登入」與「Firestore 資料庫測試模式」。
                        </div>
                    </div>
                </div>
            );

            if (loading) return <div className="flex items-center justify-center min-h-screen text-blue-600 font-black">連線中...</div>;

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <nav className="flex justify-between items-center mb-10">
                        <h1 className="text-2xl font-black text-blue-600 tracking-tighter">識別證預約系統</h1>
                        <button onClick={() => {
                            const csv = "\ufeff日期,時段,部門,姓名\n" + bookings.map(b => `${b.date},${b.slotId},${b.department},${b.name}`).join("\n");
                            const blob = new Blob([csv], { type: 'text/csv' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url; a.download = '預約名單.csv'; a.click();
                        }} className="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-slate-800 shadow-lg transition-all">匯出 CSV</button>
                    </nav>

                    <div className="grid lg:grid-cols-2 gap-10">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100 h-fit">
                            <h2 className="text-2xl font-black mb-8 text-slate-800">立即預約</h2>
                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div className="space-y-2">
                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest">部門單位</label>
                                    <select required className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold" value={formData.department} onChange={e => setFormData({...formData, department: e.target.value})}>
                                        <option value="">請選擇部門...</option>
                                        {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest">姓名</label>
                                    <input required type="text" className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="請輸入姓名" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest">選擇拍攝日期</label>
                                    <div className="grid grid-cols-3 gap-3">
                                        {availableDates.map(d => (
                                            <button key={d.value} type="button" onClick={() => setFormData({...formData, date: d.value})} className={`p-4 rounded-2xl font-black text-sm transition-all border-2 ${formData.date === d.value ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white border-slate-100 text-slate-500 hover:border-blue-100'}`}>
                                                {d.display}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                {formData.date && (
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest">選擇梯次</label>
                                        <div className="grid grid-cols-2 gap-3 max-h-60 overflow-y-auto custom-scrollbar pr-2">
                                            {timeSlots.map(s => {
                                                const c = getCount(formData.date, s.id);
                                                const full = c >= SLOT_LIMIT;
                                                return (
                                                    <button key={s.id} disabled={full} type="button" onClick={() => setFormData({...formData, slotId: s.id})} className={`p-4 rounded-2xl font-bold text-sm transition-all border-2 flex justify-between items-center ${formData.slotId === s.id ? 'bg-blue-600 border-blue-600 text-white shadow-md' : full ? 'bg-slate-100 border-transparent text-slate-300' : 'bg-white border-slate-50 text-slate-600 hover:bg-blue-50'}`}>
                                                        <span>{s.label}</span>
                                                        <span className="text-[10px] font-black">{full ? '額滿' : `剩 ${SLOT_LIMIT-c}`}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                                <button disabled={!formData.slotId || submitting} className="w-full bg-slate-900 text-white p-5 rounded-3xl font-black shadow-xl disabled:opacity-30 active:scale-95 transition-all">
                                    {submitting ? '提交中...' : '提交預約'}
                                </button>
                            </form>
                        </div>

                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
                            <h2 className="text-2xl font-black text-slate-800 mb-8">目前預約名單</h2>
                            <div className="space-y-4 max-h-[600px] overflow-y-auto custom-scrollbar pr-2">
                                {bookings.length === 0 ? <p className="text-center py-20 text-slate-200 font-bold italic">目前尚無預約資料</p> : (
                                    [...bookings].sort((a,b) => (a.date+a.slotId).localeCompare(b.date+b.slotId)).map(b => (
                                        <div key={b.id} className="p-6 bg-slate-50 rounded-3xl flex justify-between items-center border border-slate-100">
                                            <div>
                                                <div className="font-black text-slate-800 mb-1">{b.department}</div>
                                                <div className="text-xs font-bold text-slate-400">
                                                    {b.date} • {b.slotId} • {b.name}
                                                </div>
                                            </div>
                                            <div className="w-8 h-8 bg-white rounded-full flex items-center justify-center text-green-500 shadow-sm border border-slate-100">✓</div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {message.text && (
                        <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 px-10 py-5 rounded-full text-white font-black shadow-2xl z-50 transition-all ${message.type === 'success' ? 'bg-slate-900' : 'bg-rose-500'}`}>
                            {message.text}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
